name: Auto Tool Discovery

on:
  schedule:
    - cron: '0 18 * * *' # UTC 18:00 = Beijing 02:00
  workflow_dispatch:
    inputs:
      category_hint:
        description: 'Optional: suggest a specific category (AI, Design, Writing, Development, Productivity, Media, Privacy, Data, Communication, Education, Finance)'
        required: false
        type: string

concurrency:
  group: tool-autodiscover
  cancel-in-progress: true

jobs:
  create-tool-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch build data (for existing tools dedup)
        run: node scripts/fetch-build-data.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true

      - name: Prepare discovery topic
        id: prep
        run: node scripts/prepare-tool-discovery.mjs
        env:
          CATEGORY_HINT: ${{ github.event.inputs.category_hint || '' }}

      - name: Check for existing open auto-tool Issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "auto-tool" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          echo "existing=$EXISTING" >> "$GITHUB_OUTPUT"

      - name: Create Issue
        if: steps.check.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "${{ steps.prep.outputs.title }}" \
            --body-file /tmp/tool-issue-body.md \
            --label "auto-tool"
