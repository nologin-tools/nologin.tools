name: Blog Writer

on:
  issues:
    types: [opened]

jobs:
  write-blog:
    if: contains(toJSON(github.event.issue.labels), '"auto-blog"')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write blog post
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Post-process, add hero image, and create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          # Find the branch Claude pushed
          BRANCH=$(git ls-remote --heads origin "claude/issue-${ISSUE_NUMBER}-*" \
            | awk '{print $2}' | sed 's|refs/heads/||' | sort -r | head -1)

          if [ -z "$BRANCH" ]; then
            echo "No branch found for issue #${ISSUE_NUMBER}, skipping PR creation"
            exit 0
          fi
          echo "Found branch: $BRANCH"

          # Setup git auth and checkout branch
          git config user.name "blog-bot"
          git config user.email "blog-bot@nologin.tools"
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote set-url origin "$REPO"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          # Find new blog file(s) — compare against origin/main to handle multi-commit branches
          BLOG_FILE=$(git diff --name-only origin/main..."$BRANCH" -- 'src/content/blog/*.md' | head -1)
          SLUG=$(basename "$BLOG_FILE" .md 2>/dev/null || true)

          if [ -z "$SLUG" ] || [ "$SLUG" = ".md" ]; then
            echo "No blog file found in branch diff, skipping hero image"
          else
            echo "Found blog file: $BLOG_FILE (slug: $SLUG)"

            # Run hero image script with fallback chain
            API_KEY_ARG=""
            if [ -n "$UNSPLASH_ACCESS_KEY" ]; then
              API_KEY_ARG="--api-key $UNSPLASH_ACCESS_KEY"
            fi

            if node scripts/add-blog-hero-image.mjs --slug "$SLUG" $API_KEY_ARG; then
              echo "Hero image added successfully"
              git add "public/blog/images/${SLUG}/" "src/content/blog/${SLUG}.md"
              git commit -m "feat(blog): add hero image for ${SLUG}"
              git push origin "$BRANCH"
            else
              echo "Hero image failed (non-blocking), continuing without image"
            fi
          fi

          # Extract topic from issue title
          TOPIC=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title' | sed 's/^\[Auto Blog\] //')

          # Check if PR already exists
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, skipping"
            exit 0
          fi

          # Create PR
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --title "Blog: ${TOPIC}" \
            --body "Auto-generated blog post.

          Closes #${ISSUE_NUMBER}" \
            --label "auto-blog" \
            --base main)

          echo "Created PR: $PR_URL"

          # Enable auto-merge
          gh pr merge --auto --squash "$PR_URL" || echo "Auto-merge not available (branch protection may not be configured)"
