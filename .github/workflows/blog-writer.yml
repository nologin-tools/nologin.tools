name: Blog Writer

on:
  issues:
    types: [opened]

jobs:
  write-blog:
    if: contains(toJSON(github.event.issue.labels), '"auto-blog"')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write blog post
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Create PR and enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Find the branch Claude pushed
          BRANCH=$(git ls-remote --heads origin "claude/issue-${ISSUE_NUMBER}-*" \
            | awk '{print $2}' | sed 's|refs/heads/||' | sort -r | head -1)

          if [ -z "$BRANCH" ]; then
            echo "No branch found for issue #${ISSUE_NUMBER}, skipping PR creation"
            exit 0
          fi
          echo "Found branch: $BRANCH"

          # Check if PR already exists
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, skipping"
            exit 0
          fi

          # Extract topic from issue title (strip "[Auto Blog] " prefix)
          TOPIC=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title' | sed 's/^\[Auto Blog\] //')

          # Create PR
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --title "Blog: ${TOPIC}" \
            --body "Auto-generated blog post.

          Closes #${ISSUE_NUMBER}" \
            --label "auto-blog" \
            --base main)

          echo "Created PR: $PR_URL"

          # Enable auto-merge
          gh pr merge --auto --squash "$PR_URL" || echo "Auto-merge not available (branch protection may not be configured)"
