name: Blog Writer

on:
  issues:
    types: [opened]

jobs:
  write-blog:
    if: contains(toJSON(github.event.issue.labels), '"auto-blog"')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write blog post
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Post-process, add hero image, and create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          # Find the branch Claude pushed
          BRANCH=$(git ls-remote --heads origin "claude/issue-${ISSUE_NUMBER}-*" \
            | awk '{print $2}' | sed 's|refs/heads/||' | sort -r | head -1)

          if [ -z "$BRANCH" ]; then
            echo "No branch found for issue #${ISSUE_NUMBER}, skipping PR creation"
            exit 0
          fi
          echo "Found branch: $BRANCH"

          # Setup git auth and checkout branch
          git config user.name "blog-bot"
          git config user.email "blog-bot@nologin.tools"
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote set-url origin "$REPO"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          # Download hero image from Unsplash
          TOPIC=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title' | sed 's/^\[Auto Blog\] //')
          BLOG_FILE=$(git diff --name-only HEAD~1 -- src/content/blog/ | head -1)
          SLUG=$(basename "$BLOG_FILE" .md)

          IMAGE_ADDED=false
          if [ -n "$UNSPLASH_ACCESS_KEY" ] && [ -n "$SLUG" ]; then
            QUERY=$(echo "$TOPIC" | sed 's/ /+/g')
            mkdir -p "public/blog/images/${SLUG}"
            IMAGE_URL=$(curl -sf "https://api.unsplash.com/photos/random?query=${QUERY}&orientation=landscape&w=1200" \
              -H "Authorization: Client-ID ${UNSPLASH_ACCESS_KEY}" \
              | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.urls.regular)" 2>/dev/null) || true

            if [ -n "$IMAGE_URL" ]; then
              curl -sfL -o "public/blog/images/${SLUG}/hero.jpg" "$IMAGE_URL" || true
              if [ -f "public/blog/images/${SLUG}/hero.jpg" ]; then
                # Insert image after frontmatter using node
                HERO_ALT="$TOPIC" HERO_SLUG="$SLUG" node -e "
                  const fs = require('fs');
                  const f = 'src/content/blog/' + process.env.HERO_SLUG + '.md';
                  let c = fs.readFileSync(f, 'utf8');
                  const second = c.indexOf('---', c.indexOf('---') + 3);
                  if (second !== -1) {
                    const nl = c.indexOf('\n', second);
                    const img = '\n\n![' + process.env.HERO_ALT + '](/blog/images/' + process.env.HERO_SLUG + '/hero.jpg)\n';
                    c = c.slice(0, nl + 1) + img + c.slice(nl + 1);
                    fs.writeFileSync(f, c);
                  }
                "
                git add "public/blog/images/${SLUG}/hero.jpg" "src/content/blog/${SLUG}.md"
                IMAGE_ADDED=true
                echo "Hero image added for ${SLUG}"
              fi
            fi
          fi
          [ "$IMAGE_ADDED" = false ] && echo "Hero image skipped (no API key or download failed)"

          # Rewrite commit author (amend includes staged image if added)
          git commit --amend --author="blog-bot <blog-bot@nologin.tools>" --no-edit
          git push origin "$BRANCH" --force

          # Check if PR already exists
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, skipping"
            exit 0
          fi

          # Create PR
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --title "Blog: ${TOPIC}" \
            --body "Auto-generated blog post.

          Closes #${ISSUE_NUMBER}" \
            --label "auto-blog" \
            --base main)

          echo "Created PR: $PR_URL"

          # Enable auto-merge
          gh pr merge --auto --squash "$PR_URL" || echo "Auto-merge not available (branch protection may not be configured)"
