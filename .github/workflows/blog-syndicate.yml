name: Blog Syndicate

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      blog_file:
        description: 'Blog post path (e.g. src/content/blog/my-post.md)'
        required: false

concurrency:
  group: blog-syndicate
  cancel-in-progress: true

jobs:
  syndicate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syndicate blog post
        run: |
          if [ -n "${{ github.event.inputs.blog_file }}" ]; then
            node scripts/syndicate-blog.mjs --file "${{ github.event.inputs.blog_file }}"
          else
            node scripts/syndicate-blog.mjs
          fi
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
